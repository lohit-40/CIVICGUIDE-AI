<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Election Process Education Assistant - An interactive guide to understanding elections.">
    <title>CivicGuide AI - Election Education</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <h1>🗳️ CivicGuide AI</h1>
        <p>Your interactive guide to the election process</p>
    </header>

    <main class="app-container">
        <!-- Interactive Timeline Section -->
        <section class="timeline-section" aria-labelledby="timeline-heading">
            <h2 id="timeline-heading">Election Process Steps</h2>
            <div class="timeline" role="tablist" aria-orientation="vertical">
                
                <button class="timeline-item active" role="tab" aria-selected="true" aria-controls="step-content-1" id="tab-1" data-step="Voter Registration">
                    <span class="step-number">1</span>
                    <div class="step-details">
                        <h3>Voter Registration</h3>
                        <p>Checking eligibility and getting registered.</p>
                    </div>
                </button>

                <button class="timeline-item" role="tab" aria-selected="false" aria-controls="step-content-2" id="tab-2" data-step="Research Candidates">
                    <span class="step-number">2</span>
                    <div class="step-details">
                        <h3>Research Candidates</h3>
                        <p>Understanding platforms and local issues.</p>
                    </div>
                </button>

                <button class="timeline-item" role="tab" aria-selected="false" aria-controls="step-content-3" id="tab-3" data-step="Voting Day">
                    <span class="step-number">3</span>
                    <div class="step-details">
                        <h3>Voting Day</h3>
                        <p>Finding polling locations and casting your ballot.</p>
                    </div>
                </button>

                <button class="timeline-item" role="tab" aria-selected="false" aria-controls="step-content-4" id="tab-4" data-step="Election Results">
                    <span class="step-number">4</span>
                    <div class="step-details">
                        <h3>Election Results</h3>
                        <p>How votes are counted and certified.</p>
                    </div>
                </button>

            </div>
        </section>

        <!-- AI Assistant Section -->
        <section class="assistant-section" aria-labelledby="assistant-heading">
            <h2 id="assistant-heading">Ask CivicGuide AI</h2>
            <div class="context-banner" id="context-banner" aria-live="polite">
                Current Context: <strong>Voter Registration</strong>
            </div>
            
            <div class="chat-window" id="chat-window" role="log" aria-live="polite">
                <div class="message assistant-msg">
                    <p>Hello! I'm your Election Assistant. Ask me any questions about <strong>Voter Registration</strong>.</p>
                </div>
            </div>

            <form id="chat-form" class="chat-input-area">
                <label for="user-input" class="visually-hidden">Ask a question</label>
                <input type="text" id="user-input" placeholder="Type your question here..." required autocomplete="off">
                <button type="submit" id="send-btn" aria-label="Send message">Send</button>
            </form>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
